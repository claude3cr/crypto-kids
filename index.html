<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Crypto Kids</title>

  <!-- Fullscreen, no zoom, iPad "Add to Home Screen" behaves like an app -->
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Crypto Kids">
  <meta name="theme-color" content="#0e1430">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="style.css?v=1">
</head>
<body>
  <div id="app">
    <header id="topbar">
      <button id="homeBtn" class="chrome-btn" aria-label="Inicio" hidden>🏠</button>
      <div id="wallet" class="wallet">
        <span class="jar" title="Monedas">🫙 <b id="coinCount">0</b></span>
        <span class="stars" title="Estrellas">⭐ <b id="starCount">0</b></span>
      </div>
    </header>
    <main id="screen"><!-- home or active game mounts here --></main>
  </div>

  <script type="module" src="app.js?v=1"></script>
</body>
</html>
